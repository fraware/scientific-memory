name: docs-blueprint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install blueprint tooling
        run: |
          python -m pip install --upgrade pip
          pip install leanblueprint

      - name: Smoke check blueprint CLI
        run: leanblueprint --help
