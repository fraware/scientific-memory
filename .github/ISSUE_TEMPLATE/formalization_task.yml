name: Formalization task
description: Add or improve formalization for a mapped claim bundle
title: "[formalization] "
labels: ["formalization"]
body:
  - type: input
    id: paper_id
    attributes:
      label: Paper ID
  - type: input
    id: claim_id
    attributes:
      label: Claim ID
  - type: input
    id: target_decl
    attributes:
      label: Target Lean declaration
  - type: textarea
    id: statement
    attributes:
      label: Informal statement
  - type: textarea
    id: assumptions
    attributes:
      label: Linked assumptions
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - declaration compiles
        - theorem card generated
        - source linkage preserved
        - coverage report updated
